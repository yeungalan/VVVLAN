<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VVVLAN</title>
<style>
  :root {
    --bg: #0f1420; --panel: #171e2e; --panel2: #1e2740; --border: #2a3550;
    --text: #e6ebf5; --muted: #8b96ad; --accent: #5b8cff; --ok: #34c98e;
    --warn: #f0b23e; --bad: #e5646c; --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
  header { display: flex; align-items: center; gap: 12px; padding: 14px 24px;
           border-bottom: 1px solid var(--border); background: var(--panel); }
  header h1 { font-size: 18px; margin: 0; letter-spacing: 1px; }
  header h1 span { color: var(--accent); }
  header .spacer { flex: 1; }
  main { max-width: 1080px; margin: 0 auto; padding: 24px; }
  .card { background: var(--panel); border: 1px solid var(--border);
          border-radius: 10px; padding: 18px 20px; margin-bottom: 18px; }
  .card h2 { margin: 0 0 12px; font-size: 15px; color: var(--muted);
             text-transform: uppercase; letter-spacing: 1px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 10px;
       border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid rgba(42,53,80,.5); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  .mono { font-family: var(--mono); font-size: 13px; }
  .muted { color: var(--muted); }
  .pill { display: inline-block; padding: 1px 9px; border-radius: 999px; font-size: 12px;
          border: 1px solid var(--border); }
  .pill.on  { color: var(--ok); border-color: var(--ok); }
  .pill.off { color: var(--muted); }
  .pill.gw  { color: var(--warn); border-color: var(--warn); }
  .pill.direct { color: var(--ok); border-color: var(--ok); }
  .pill.relay  { color: var(--warn); border-color: var(--warn); }
  button, input, select {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 7px 12px; font: inherit; font-size: 14px; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger:hover { border-color: var(--bad); color: var(--bad); }
  button.small { padding: 3px 9px; font-size: 12.5px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .netlist { display: flex; gap: 10px; flex-wrap: wrap; }
  .netbtn { padding: 8px 14px; border-radius: 8px; }
  .netbtn.sel { background: var(--accent); border-color: var(--accent); color: #fff; }
  code.copy { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
              padding: 6px 10px; display: inline-block; cursor: pointer; word-break: break-all; }
  code.copy:hover { border-color: var(--accent); }
  #login { max-width: 420px; margin: 12vh auto; }
  .err { color: var(--bad); margin-top: 8px; min-height: 1.2em; }
  .hint { color: var(--muted); font-size: 13px; margin-top: 10px; }
  dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border);
           border-radius: 12px; padding: 22px; min-width: 340px; }
  dialog::backdrop { background: rgba(0,0,0,.55); }
  label { display: block; margin: 10px 0 4px; color: var(--muted); font-size: 13px; }
  input { width: 100%; }
</style>
</head>
<body>

<header>
  <h1>VVV<span>LAN</span></h1>
  <span class="muted">virtual network control panel</span>
  <span class="spacer"></span>
  <button id="logout" style="display:none">Sign out</button>
</header>

<main>
  <div id="login" class="card">
    <h2>Admin sign in</h2>
    <label>Admin key (printed when vvvlan-server starts)</label>
    <input id="adminkey" type="password" autocomplete="off">
    <div class="err" id="loginerr"></div>
    <button class="primary" id="signin">Sign in</button>
  </div>

  <div id="app" style="display:none">
    <div class="card">
      <h2>Networks</h2>
      <div class="row">
        <div class="netlist" id="networks"></div>
        <button id="newnet">+ New network</button>
      </div>
    </div>

    <div id="netview" style="display:none">
      <div class="card">
        <h2>Join a node</h2>
        <div class="row">
          <button class="primary" id="mktoken">Generate join token</button>
          <span class="muted" id="netmeta"></span>
        </div>
        <div id="joincmd" style="margin-top:12px"></div>
      </div>

      <div class="card">
        <h2>Nodes</h2>
        <table>
          <thead><tr>
            <th>Name</th><th>Virtual IP</th><th>OS</th><th>Status</th>
            <th>Connectivity</th><th>Last seen</th><th></th>
          </tr></thead>
          <tbody id="nodes"></tbody>
        </table>
        <div class="hint">The <b>gateway</b> node provides internet passthrough: peers that run
          <span class="mono">vvvland exit on</span> route all traffic through it.</div>
      </div>
    </div>
  </div>
</main>

<dialog id="netdlg">
  <h2 style="margin-top:0">New network</h2>
  <label>Name</label>
  <input id="netname" placeholder="homelab">
  <label>CIDR (optional, e.g. 10.60.0.0/24)</label>
  <input id="netcidr" placeholder="auto">
  <div class="err" id="neterr"></div>
  <div class="row" style="margin-top:14px; justify-content:flex-end">
    <button onclick="netdlg.close()">Cancel</button>
    <button class="primary" id="netcreate">Create</button>
  </div>
</dialog>

<script>
"use strict";
const $ = id => document.getElementById(id);
let key = localStorage.getItem("vvvlan_admin_key") || "";
let selected = localStorage.getItem("vvvlan_net") || "";
let timer = null;

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: { "Authorization": "Bearer " + key, "Content-Type": "application/json" },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (res.status === 401) { showLogin("session expired — sign in again"); throw new Error("unauthorized"); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
  return data;
}

function showLogin(msg) {
  clearInterval(timer);
  $("login").style.display = "";
  $("app").style.display = "none";
  $("logout").style.display = "none";
  $("loginerr").textContent = msg || "";
}

async function signIn() {
  key = $("adminkey").value.trim();
  try {
    await api("GET", "/api/networks");
    localStorage.setItem("vvvlan_admin_key", key);
    showApp();
  } catch (e) {
    if (e.message !== "unauthorized") $("loginerr").textContent = e.message;
    else $("loginerr").textContent = "invalid admin key";
  }
}

function showApp() {
  $("login").style.display = "none";
  $("app").style.display = "";
  $("logout").style.display = "";
  refresh();
  timer = setInterval(refresh, 5000);
}

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[c]);
}

function ago(iso) {
  const t = new Date(iso).getTime();
  if (!t || t < 0) return "never";
  const s = Math.max(0, (Date.now() - t) / 1000);
  if (s < 60) return Math.floor(s) + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}

let networks = [];
async function refresh() {
  try { networks = await api("GET", "/api/networks"); } catch { return; }
  const list = $("networks");
  list.innerHTML = "";
  for (const nw of networks) {
    const b = document.createElement("button");
    b.className = "netbtn" + (nw.id === selected ? " sel" : "");
    b.textContent = `${nw.name} (${nw.node_count})`;
    b.onclick = () => { selected = nw.id; localStorage.setItem("vvvlan_net", selected); refresh(); };
    list.appendChild(b);
  }
  if (!networks.find(n => n.id === selected)) selected = networks[0]?.id || "";
  $("netview").style.display = selected ? "" : "none";
  if (selected) await renderNetwork(networks.find(n => n.id === selected));
}

async function renderNetwork(nw) {
  $("netmeta").textContent = `${nw.cidr} · network id ${nw.id}`;
  let nodes = [];
  try { nodes = await api("GET", `/api/networks/${nw.id}/nodes`); } catch { return; }
  const tbody = $("nodes");
  tbody.innerHTML = "";
  if (!nodes.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="muted">No nodes yet — generate a join token above.</td></tr>`;
  }
  for (const n of nodes) {
    const paths = (n.paths || []).map(p => {
      const peer = nodes.find(x => x.node_id === p.peer_node_id);
      const name = peer ? peer.name : p.peer_node_id.slice(0, 8);
      return p.direct
        ? `<span class="pill direct" title="${esc(p.endpoint)}">${esc(name)}: direct ${p.latency_ms}ms</span>`
        : `<span class="pill relay">${esc(name)}: relay</span>`;
    }).join(" ") || `<span class="muted">—</span>`;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${esc(n.name)} ${n.is_gateway ? '<span class="pill gw">gateway</span>' : ""}
          <div class="muted mono" style="font-size:11.5px">${esc(n.node_id.slice(0, 16))}…</div></td>
      <td class="mono">${esc(n.virtual_ip)}</td>
      <td>${esc(n.os)}</td>
      <td>${n.online ? '<span class="pill on">online</span>' : '<span class="pill off">offline</span>'}</td>
      <td>${paths}</td>
      <td class="muted">${ago(n.last_seen)}</td>
      <td class="row" style="flex-wrap:nowrap">
        <button class="small" data-gw="${esc(n.node_id)}">${n.is_gateway ? "Unset gateway" : "Set gateway"}</button>
        <button class="small danger" data-del="${esc(n.node_id)}">Remove</button>
      </td>`;
    tbody.appendChild(tr);
  }
  tbody.querySelectorAll("[data-gw]").forEach(b => b.onclick = async () => {
    const id = b.dataset.gw;
    const isGw = nodes.find(n => n.node_id === id)?.is_gateway;
    await api("POST", `/api/networks/${nw.id}/gateway`, { node_id: isGw ? "" : id }).catch(alertErr);
    refresh();
  });
  tbody.querySelectorAll("[data-del]").forEach(b => b.onclick = async () => {
    if (!confirm("Remove this node from the network?")) return;
    await api("DELETE", `/api/nodes/${b.dataset.del}`).catch(alertErr);
    refresh();
  });
}

function alertErr(e) { alert(e.message); }

$("mktoken").onclick = async () => {
  try {
    const tok = await api("POST", `/api/networks/${selected}/tokens`, { ttl_seconds: 86400 });
    const server = location.origin;
    const cmd = `vvvland join --server ${server} --token ${tok.token}`;
    $("joincmd").innerHTML = `
      <div class="muted" style="margin-bottom:6px">Run this on the new node (valid 24h) — click to copy:</div>
      <code class="copy mono" title="click to copy">${esc(cmd)}</code>`;
    $("joincmd").querySelector("code").onclick = ev => {
      navigator.clipboard.writeText(cmd);
      ev.target.style.borderColor = "var(--ok)";
      setTimeout(() => ev.target.style.borderColor = "", 700);
    };
  } catch (e) { alertErr(e); }
};

$("newnet").onclick = () => { $("neterr").textContent = ""; $("netname").value = ""; $("netcidr").value = ""; netdlg.showModal(); };
$("netcreate").onclick = async () => {
  try {
    const nw = await api("POST", "/api/networks", { name: $("netname").value.trim(), cidr: $("netcidr").value.trim() });
    selected = nw.id; localStorage.setItem("vvvlan_net", selected);
    netdlg.close(); refresh();
  } catch (e) { $("neterr").textContent = e.message; }
};

$("signin").onclick = signIn;
$("adminkey").addEventListener("keydown", e => { if (e.key === "Enter") signIn(); });
$("logout").onclick = () => { localStorage.removeItem("vvvlan_admin_key"); key = ""; showLogin(); };

if (key) { api("GET", "/api/networks").then(showApp).catch(() => showLogin()); }
else showLogin();
</script>
</body>
</html>
